<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ向け viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <!-- ★ router.js を最初に読み込む（PCからのアクセスをPC版に振り分け） -->
  <script src="../common/router.js"></script>

  <head prefix="og: https://ogp.me/ns#">
  <meta property="og:url" content="https://aipptx-mrswnxy8lm.github.io/AI-pptx/sp/0006_OiHbyxI_sp.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="AIスライド生成支援ツール①（スマホ版）">
  <meta property="og:description" content="AIでPowerPointスライドを生成するツールのスマホ版です。">
  <meta property="og:image" content="https://aipptx-mrswnxy8lm.github.io/AI-pptx/OGPimg.jpeg">

  <!-- Google tag（PC版と同じ計測ID） -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MESVNVQ731"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MESVNVQ731');
  </script>

  <title>AIスライド生成支援ツール①（スマホ版）</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <!-- ① PC版と共通のスタイル -->
  <link rel="stylesheet" href="../common/style.css">
</head>
<body>
<header style="background:#CCFFFF;">
  <h2 style="margin:0;padding:10px 12px;font-size:1.1em;">
    AIスライド生成支援ツール① <span style="font-size:0.85em;color:#555;">（スマホ版）</span>
  </h2>
</header>
<div id="app"></div>

<script>
// ② PC版と共通の app.html を fetch して注入（パスは ../common/ を参照）
fetch("../common/app.html")
  .then(r => r.text())
  .then(html => {
    document.getElementById("app").innerHTML = html;

    // ③ PC版と共通の main.js
    const mainScript = document.createElement("script");
    mainScript.src = "../common/main.js";
    document.body.appendChild(mainScript);

    // ④ スマホ専用スタイル（main.js の appReady 発火後に setupSP が走る）
    const spScript = document.createElement("script");
    spScript.src = "../common/sp_style.js";
    document.body.appendChild(spScript);
  });
</script>

<!-- pptxgenjs（PC版と同じバージョン） -->
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<!-- JSZip: PPTXプレビュー用 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
