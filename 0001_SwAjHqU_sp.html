  <link rel="stylesheet" href="style.css">

<body>

<header style="background:#CCFFFF;">
  <h2 style="margin:0;padding:10px 12px;font-size:1.1em;">
    AIスライド生成支援ツール① <span style="font-size:0.85em;color:#555;">(スマホ版)</span>
  </h2>
</header>

<div id="app"></div>

<script>
// ② PC版と共通の app.html を fetch して注入
fetch("common/app.html")
  .then(function(r){ return r.text(); })
  .then(function(html){
    document.getElementById("app").innerHTML = html;

    // ③ PC版と共通の main.js を読み込む
    var mainScript = document.createElement("script");
    mainScript.src = "main.js";
    document.body.appendChild(mainScript);

    // ④ スマホ専用スタイルを main.js の直後に読み込む
    //    （main.js が appReady を発火した後に setupSP() が走る）
    var spScript = document.createElement("script");
    spScript.src = "sp_style.js";
    document.body.appendChild(spScript);
  });
</script>

<!-- pptxgenjs（PC版と同じバージョン） -->
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<!-- JSZip: PPTXプレビュー用 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
